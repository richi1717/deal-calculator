<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- body -->
  <rect width="32" height="32" rx="6" fill="#161b22"/>
  <!-- display -->
  <rect x="4" y="4" width="24" height="9" rx="2" fill="#10b981"/>
  <!-- button grid: 3 cols × 2 rows -->
  <rect x="4"  y="16" width="6" height="5" rx="1.5" fill="#ffffff" opacity="0.3"/>
  <rect x="13" y="16" width="6" height="5" rx="1.5" fill="#ffffff" opacity="0.3"/>
  <rect x="22" y="16" width="6" height="5" rx="1.5" fill="#ffffff" opacity="0.3"/>
  <rect x="4"  y="23" width="6" height="5" rx="1.5" fill="#ffffff" opacity="0.3"/>
  <rect x="13" y="23" width="6" height="5" rx="1.5" fill="#ffffff" opacity="0.3"/>
  <!-- = button highlighted green -->
  <rect x="22" y="23" width="6" height="5" rx="1.5" fill="#10b981"/>
</svg>
